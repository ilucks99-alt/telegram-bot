name: telegram-bot-cron

on:
  schedule:
    # Every 15 min — single cron drives all work (news + task check)
    # Server-side logic decides what to run based on KST time
    - cron: '5,20,35,50 * * * *'
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Call /cron/tick
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -sS -X POST "${RENDER_URL}/cron/tick" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --max-time 180
